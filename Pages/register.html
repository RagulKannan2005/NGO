<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="../assets/Images/logo1.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script>
      (function () {
        const theme = localStorage.getItem("theme");
        const dir = localStorage.getItem("dir") || "ltr";
        if (
          theme === "dark" ||
          (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
        document.documentElement.dir = dir;
      })();
    </script>
    <title>Register | NGO Training</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/app.css" />
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
      /* REGISTER SPECIFIC - REUSING LOGIN THEME */
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem 1rem;
        background:
          radial-gradient(circle at 20% 20%, #1e3a8a, transparent 40%),
          radial-gradient(circle at 80% 80%, #7c3aed, transparent 40%),
          var(--bg);
      }

      .register-card {
        width: 100%;
        max-width: 500px;
        padding: 3rem 2rem;
        border-radius: 28px;
        background: var(--card);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        text-align: center;
      }

      .logo-box {
        cursor: pointer;
        margin-bottom: 25px;
        display: flex;
        justify-content: center;
        transition: transform 0.3s ease;
      }
      .logo-box:hover {
        transform: scale(1.05);
      }
      .logo-box img {
        height: 60px;
        object-fit: contain;
      }

      .register-card h2 {
        font-size: 2rem;
        margin-bottom: 0.4rem;
        font-weight: 700;
      }

      .register-card p.subtitle {
        color: var(--muted);
        font-size: 0.95rem;
        margin-bottom: 2rem;
      }

      /* FORM */
      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.2rem;
        text-align: start;
        margin-bottom: 1.5rem;
      }

      .form-group {
        margin-bottom: 0;
      }

      .form-group.full {
        grid-column: 1 / -1;
      }

      .form-group label {
        display: block;
        font-size: 0.85rem;
        margin-bottom: 0.4rem;
        color: var(--muted);
        font-weight: 500;
      }

      .form-group input {
        width: 100%;
        padding: 0.75rem 1rem;
        border-radius: 10px;
        border: 1px solid rgba(128, 128, 128, 0.15);
        background: rgba(128, 128, 128, 0.04);
        color: var(--text);
        outline: none;
        transition: 0.3s ease;
        font-family: inherit;
        box-sizing: border-box;
      }

      .form-group input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      }

      /* REGISTER BUTTON */
      .register-btn {
        width: 100%;
        padding: 0.9rem;
        border-radius: 999px;
        border: none;
        cursor: pointer;
        font-weight: 700;
        font-size: 1rem;
        color: white;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        transition: 0.3s ease;
        margin-top: 0.5rem;
      }

      .register-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 25px rgba(37, 99, 235, 0.3);
      }

      /* FOOTER */
      .card-footer {
        margin-top: 1.5rem;
        font-size: 0.9rem;
        color: var(--muted);
      }

      .card-footer a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
      }

      /* MOBILE RESPONSIVE */
      @media (max-width: 480px) {
        .form-grid {
          grid-template-columns: 1fr;
        }
        .register-card {
          padding: 2rem 1.5rem;
        }
      }
    </style>
  </head>

  <body>
    <!-- LOADER -->
    <div class="cssloader" id="page-loader">
      <div class="triangle1"></div>
      <div class="triangle2"></div>
      <p class="text">Please Wait</p>
    </div>

    <div class="register-card" style="position: relative">
      <div class="logo-box" onclick="window.location.href='../index.html'">
        <img src="../assets/Images/logo.png" alt="NGO Logo" />
      </div>
      <a href="../index.html"
        style="
          position: absolute;
          top: 1.5rem;
          left: 1.5rem;
          color: var(--muted);
          text-decoration: none;
          display: flex;
          align-items: center;
          gap: 5px;
          font-size: 0.85rem;
          transition: 0.2s;
        "
      >
        <i data-lucide="arrow-left" style="width: 14px; height: 14px"></i> Back
      </a>

      <h2>Create Account</h2>
      <p class="subtitle">Join our community of over 500+ global NGOs</p>

      <form id="registerForm">
        <div class="form-grid">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" placeholder="John" required />
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" placeholder="Doe" required />
          </div>
          <div class="form-group full">
            <label>Email Address</label>
            <input type="email" placeholder="john.doe@ngo.org" required />
          </div>
          <div class="form-group full">
            <label>Affiliated NGO</label>
            <input type="text" placeholder="Organization Name" required />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input
              type="password"
              id="password"
              placeholder="••••••••"
              required
            />
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <input
              type="password"
              id="confirmPassword"
              placeholder="••••••••"
              required
            />
          </div>
        </div>

        <button type="submit" class="register-btn">Create Free Account</button>
      </form>

      <div class="card-footer">
        Already have an account? <a href="login.html">Login</a>
      </div>
    </div>

    <script src="../assets/js/theme.js"></script>
    <script>
      document
        .getElementById("registerForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const pwd = document.getElementById("password").value;
          const confirmPwd = document.getElementById("confirmPassword").value;

          if (pwd !== confirmPwd) {
            alert("Passwords do not match!");
            return;
          }

          alert("Registration successful! Welcome to NGO Training.");
          window.location.href = "UserDashboard.html";
        });
    </script>
  </body>
</html>
