<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Coming Soon</title>

    <link rel="stylesheet" href="coming-soon.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #1d2671, #c33764);
        color: white;
        text-align: center;
        padding: 20px;
      }

      .container {
        max-width: 600px;
      }

      h1 {
        font-size: 60px;
        margin-bottom: 20px;
      }

      p {
        margin-bottom: 40px;
        opacity: 0.9;
      }

      .countdown {
        display: flex;
        justify-content: center;
        gap: 25px;
        margin-bottom: 40px;
      }

      .time {
        background: rgba(255, 255, 255, 0.15);
        padding: 20px;
        border-radius: 10px;
        min-width: 80px;
      }

      .time span {
        font-size: 28px;
        font-weight: 700;
        display: block;
      }

      .time small {
        opacity: 0.8;
      }

      .notify-form {
        display: flex;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .notify-form input {
        padding: 12px;
        border: none;
        border-radius: 25px;
        outline: none;
        width: 220px;
      }

      .notify-form button {
        padding: 12px 25px;
        border: none;
        border-radius: 25px;
        background: white;
        color: #c33764;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
      }

      .notify-form button:hover {
        background: #eee;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Coming Soon</h1>

      <p>
        Our website is currently under development. We’re working hard to launch
        something amazing.
      </p>

      <div class="countdown">
        <div class="time">
          <span id="days">00</span>
          <small>Days</small>
        </div>

        <div class="time">
          <span id="hours">00</span>
          <small>Hours</small>
        </div>

        <div class="time">
          <span id="minutes">00</span>
          <small>Minutes</small>
        </div>

        <div class="time">
          <span id="seconds">00</span>
          <small>Seconds</small>
        </div>
      </div>

      <form class="notify-form">
        <input type="email" placeholder="Enter your email" required />
        <button type="submit">Notify Me</button>
      </form>
    </div>

    <script src="coming-soon.js"></script>
  </body>
</html>
