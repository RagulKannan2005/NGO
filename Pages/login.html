<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script>
      (function () {
        const theme = localStorage.getItem("theme");
        const dir = localStorage.getItem("dir") || "ltr";
        if (
          theme === "dark" ||
          (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        }
        document.documentElement.dir = dir;
      })();
    </script>
    <title>Login | NGO Training</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/app.css" />
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
      /* LOGIN SPECIFIC */
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at 20% 20%, #1e3a8a, transparent 40%),
          radial-gradient(circle at 80% 30%, #0ea5e9, transparent 40%),
          var(--bg);
      }

      /* LOGIN CARD */
      .login-card {
        width: 100%;
        max-width: 420px;
        padding: 2.5rem 2rem;
        border-radius: 18px;
        background: var(--card);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        text-align: center;
      }

      .login-card h2 {
        font-size: 1.8rem;
        margin-bottom: 0.4rem;
      }

      .login-card p {
        color: var(--muted);
        font-size: 0.9rem;
        margin-bottom: 1.5rem;
      }

      /* GOOGLE BUTTON */
      .google-btn {
        width: 100%;
        padding: 0.7rem;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        font-weight: 500;
        cursor: pointer;
        margin-bottom: 1.2rem;
        transition: 0.3s ease;
      }

      .google-btn:hover {
        background: rgba(255, 255, 255, 0.12);
      }

      /* DIVIDER */
      .divider {
        display: flex;
        align-items: center;
        margin: 1.2rem 0;
        color: var(--muted);
        font-size: 0.8rem;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: rgba(255, 255, 255, 0.1);
      }
      .divider span {
        margin: 0 10px;
      }

      /* FORM */
      .form-group {
        text-align: start;
        margin-bottom: 1.2rem;
      }

      .form-group label {
        display: block;
        font-size: 0.85rem;
        margin-bottom: 0.4rem;
        color: var(--muted);
      }

      .form-group input {
        width: 100%;
        padding: 0.75rem 0.9rem;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        outline: none;
        transition: 0.3s ease;
      }

      .form-group input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
      }

      .form-options {
        display: flex;
        justify-content: space-between;
        font-size: 0.8rem;
        margin-bottom: 1.4rem;
        color: var(--muted);
      }

      .form-options a {
        color: var(--primary);
        text-decoration: none;
      }

      /* LOGIN BUTTON */
      .login-btn {
        width: 100%;
        padding: 0.8rem;
        border-radius: 999px;
        border: none;
        cursor: pointer;
        font-weight: 600;
        font-size: 1rem;
        color: white;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        transition: 0.3s ease;
      }

      .login-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 25px rgba(56, 189, 248, 0.3);
      }

      /* FOOTER */
      .login-footer {
        margin-top: 1.2rem;
        font-size: 0.85rem;
        color: var(--muted);
      }

      .login-footer a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 500;
      }
    </style>
  </head>

  <body>
    <div class="cssloader" id="page-loader">
      <div class="triangle1"></div>
      <div class="triangle2"></div>
      <p class="text">Please Wait</p>
    </div>
    <div class="login-card" style="position: relative">
      <a
        href="../index.html"
        style="
          position: absolute;
          top: 1.5rem;
          left: 1.5rem;
          color: var(--muted);
          text-decoration: none;
          display: flex;
          align-items: center;
          gap: 5px;
          font-size: 0.85rem;
          transition: 0.2s;
        "
      >
        <i data-lucide="arrow-left" style="width: 14px; height: 14px"></i> Back
      </a>
      <h2>Welcome Back</h2>
      <p>Login to access your NGO training dashboard</p>

      <!-- Google Login -->
      <button class="google-btn">🔐 Continue with Google</button>

      <div class="divider"><span>OR</span></div>

      <!-- Email Login -->
      <form>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="Enter your email" required />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="Enter your password" required />
        </div>

        <div class="form-options">
          <label><input type="checkbox" /> Remember me</label>
          <a href="javascript:void(0)">Forgot password?</a>
        </div>

        <button type="submit" class="login-btn">Login</button>
      </form>

      <div class="login-footer">
        Don’t have an account? <a href="javascript:void(0)">Register</a>
      </div>
    </div>

    <script src="../assets/js/theme.js"></script>
  </body>
</html>
